<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>POSSESSION — Character Codex</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Noto+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════
   TOKENS — แก้ที่นี่ที่เดียว
═══════════════════════════════════════════ */
:root {
  /* Brand palette */
  --c-bg:       #07040f;
  --c-surface:  #0e0818;
  --c-panel:    #130c20;
  --c-border:   rgba(180, 120, 255, 0.15);
  --c-border-hi:rgba(255, 100, 180, 0.45);

  --c-pink:   #ff5fa0;
  --c-purple: #9b5de5;
  --c-violet: #6e3fba;
  --c-gold:   #f0c060;
  --c-blue:   #5ab4ff;
  --c-green:  #50d890;
  --c-red:    #ff5252;

  /* Grad */
  --g-brand: linear-gradient(135deg, var(--c-pink), var(--c-purple));
  --g-gold:  linear-gradient(135deg, #f0c060, #c8860a);

  /* Type */
  --font-display: 'Cinzel Decorative', serif;
  --font-ui:      'Cinzel', serif;
  --font-body:    'Noto Sans Thai', sans-serif;

  /* Spacing */
  --r-card: 16px;
  --r-box:  12px;
  --r-pill: 40px;
}

/* ─── Reset ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  overflow-x: hidden;
  background: var(--c-bg);
  color: #e8e0f8;
  font-family: var(--font-body);
  scroll-behavior: smooth;
  -webkit-tap-highlight-color: transparent;
}

/* ─── Background atmosphere ─── */
#bg {
  position: fixed; inset: 0; z-index: -3;
  background-size: cover; background-position: center top;
  background-repeat: no-repeat;
  filter: brightness(0.22) saturate(1.4);
}
#bg-gradient {
  position: fixed; inset: 0; z-index: -2;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(110,63,186,0.35) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 80%, rgba(255,95,160,0.1) 0%, transparent 50%),
    linear-gradient(180deg, rgba(7,4,15,0.5) 0%, rgba(7,4,15,0.95) 100%);
}
#bg-noise {
  position: fixed; inset: 0; z-index: -1;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.6; pointer-events: none;
}
#particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

/* ─── Scroll Progress ─── */
#scroll-progress {
  position: fixed; top: 0; left: 0; height: 2px; width: 0%;
  background: linear-gradient(90deg, var(--c-violet), var(--c-pink), var(--c-gold));
  z-index: 9999; box-shadow: 0 0 10px rgba(255,95,160,0.7);
  transition: width 0.08s linear;
}

/* ─── Custom Cursor ─── */
@media (hover: hover) and (pointer: fine) {
  * { cursor: none !important; }
  #cursor-dot {
    position: fixed; width: 7px; height: 7px; border-radius: 50%;
    background: var(--c-pink); pointer-events: none; z-index: 999999;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 12px rgba(255,95,160,0.9);
    transition: width .15s, height .15s, background .15s;
  }
  #cursor-ring {
    position: fixed; width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid rgba(255,95,160,0.4); pointer-events: none; z-index: 999998;
    transform: translate(-50%, -50%);
    transition: width .2s, height .2s, border-color .2s;
  }
  body.cur-hover #cursor-dot  { width: 10px; height: 10px; background: var(--c-purple); }
  body.cur-hover #cursor-ring { width: 40px; height: 40px; border-color: rgba(155,93,229,0.6); }
  body.cur-click #cursor-dot  { transform: translate(-50%,-50%) scale(0.55); }
}

/* ─── Toast ─── */
#toast-wrap {
  position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%);
  z-index: 9990; display: flex; flex-direction: column; align-items: center; gap: 8px;
  pointer-events: none;
}
.toast {
  background: rgba(13,8,28,0.96); border: 1px solid rgba(255,95,160,0.3);
  border-radius: 40px; padding: 8px 20px 8px 14px;
  display: flex; align-items: center; gap: 10px;
  backdrop-filter: blur(14px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  animation: toastIn .3s cubic-bezier(.23,1,.32,1) both;
  white-space: nowrap;
}
.toast.out { animation: toastOut .3s ease forwards; }
@keyframes toastIn  { from { opacity:0; transform:translateY(14px) scale(.92); } to { opacity:1; transform:none; } }
@keyframes toastOut { to { opacity:0; transform:translateY(-8px) scale(.9); } }
.toast-pip { width:7px; height:7px; border-radius:50%; background:var(--c-pink); box-shadow:0 0 8px var(--c-pink); }
.toast-txt { font:600 .75rem/1 var(--font-ui); letter-spacing:.05em; color:rgba(255,255,255,.85); }

/* ══════════════════════════════════════════
   MANUAL BAR — Image Slideshow
════════════════════════════════════════════ */
#manual {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,8,28,0.97);
  border-bottom: 1px solid var(--c-border);
  backdrop-filter: blur(24px);
}
#manual::before {
  content: '';
  position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--c-violet) 25%, var(--c-pink) 50%, var(--c-violet) 75%, transparent 100%);
  background-size: 200% 100%;
  animation: stripe 4s linear infinite;
}
@keyframes stripe { to { background-position: 200% 0; } }

.manual-header {
  max-width: 1200px; margin: 0 auto;
  padding: 14px 24px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer; user-select: none;
}
.manual-logo {
  height: 34px; width: auto; flex-shrink: 0;
  filter: drop-shadow(0 0 10px rgba(255,95,160,0.5));
}
.manual-title {
  font: 900 1.1rem/1 var(--font-display);
  background: linear-gradient(90deg, #fff 0%, var(--c-pink) 60%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: .06em; flex: 1;
}
.manual-badge {
  font: 700 .65rem/1 var(--font-ui); letter-spacing: .12em;
  text-transform: uppercase; padding: 4px 14px; border-radius: 20px;
  background: var(--g-brand); color: #fff;
  box-shadow: 0 0 14px rgba(155,93,229,0.4);
  flex-shrink: 0;
}
.manual-toggle {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: rgba(255,255,255,.05); border: 1px solid var(--c-border);
  display: flex; align-items: center; justify-content: center;
  font-size: .8rem; color: rgba(255,255,255,.5);
  transition: transform .35s, background .2s;
}
#manual.collapsed .manual-toggle { transform: rotate(-90deg); }

.manual-body {
  overflow: hidden;
  max-height: 1200px;
  transition: max-height .55s cubic-bezier(.23,1,.32,1);
}
#manual.collapsed .manual-body { max-height: 0; }

/* ── Manual icon button ── */
#manual-slideshow {
  position: relative;
  margin: 0 auto;
  padding: 8px 16px 10px;
  display: flex;
  justify-content: center;
}
#manual-icon-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  padding: 6px 18px 6px 8px;
  border-radius: 40px;
  border: 1px solid rgba(255,95,160,.25);
  background: rgba(255,95,160,.06);
  transition: background .2s, border-color .2s, box-shadow .2s;
}
#manual-icon-btn:hover {
  background: rgba(255,95,160,.14);
  border-color: rgba(255,95,160,.5);
  box-shadow: 0 0 16px rgba(255,95,160,.2);
}
#manual-slide-img {
  display: block;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
  box-shadow: 0 0 10px rgba(255,95,160,.4);
  flex-shrink: 0;
}
.manual-icon-label {
  font: 600 .78rem/1 var(--font-ui);
  letter-spacing: .08em;
  color: rgba(255,255,255,.75);
}
.slide-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-top: 12px;
}
.slide-btn {
  background: rgba(155,93,229,.18);
  border: 1px solid rgba(155,93,229,.4);
  color: #fff;
  width: 40px; height: 40px;
  border-radius: 50%;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s, border-color .2s;
  flex-shrink: 0;
}
.slide-btn:hover { background: rgba(155,93,229,.45); border-color: var(--c-violet); }
.slide-btn:disabled { opacity: .3; cursor: default; }
.slide-counter {
  font: 600 .8rem/1 var(--font-ui);
  color: rgba(255,255,255,.5);
  letter-spacing: .06em;
  min-width: 50px;
  text-align: center;
}

@media (max-width: 767px) {
  #manual .manual-header { padding: 12px 16px; gap: 10px; }
  .manual-title { font-size: .85rem; }
  .manual-badge { display: none; }
  #manual-slideshow { padding: 10px 12px 16px; }
}
@media (max-width: 480px) {
  .manual-title { font-size: .78rem; }
  .manual-logo { height: 26px; }
}

/* ══════════════════════════════════════════
   FILTER BAR
══════════════════════════════════════════ */
#filter-bar {
  max-width: 1200px; margin: 18px auto 14px;
  padding: 0 20px;
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  position: relative; z-index: 2;
}

.search-wrap {
  flex: 1; min-width: 200px; position: relative;
}
.search-icon {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  color: rgba(255,95,160,.5); font-size: .9rem; pointer-events: none;
}
#search-input {
  width: 100%; background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,95,160,.2); border-radius: var(--r-pill);
  padding: 9px 18px 9px 42px;
  color: #fff; font: 400 .85rem/1 var(--font-body); outline: none;
  transition: border-color .2s, background .2s, box-shadow .2s;
}
#search-input::placeholder { color: rgba(255,255,255,.22); }
#search-input:focus {
  border-color: rgba(255,95,160,.5);
  background: rgba(255,255,255,.07);
  box-shadow: 0 0 0 3px rgba(255,95,160,.1);
}

.filter-btn {
  padding: 8px 18px; border-radius: var(--r-pill);
  border: 1px solid rgba(255,255,255,.1);
  background: rgba(255,255,255,.04);
  color: rgba(255,255,255,.5);
  font: 700 .72rem/1 var(--font-ui); letter-spacing: .05em;
  cursor: pointer; transition: all .2s; white-space: nowrap;
}
.filter-btn:hover  { border-color: rgba(255,95,160,.35); color: rgba(255,255,255,.85); }
.filter-btn.active {
  background: linear-gradient(135deg, rgba(255,95,160,.2), rgba(155,93,229,.2));
  border-color: rgba(255,95,160,.5); color: #fff;
  box-shadow: 0 0 14px rgba(255,95,160,.15);
}

/* ══════════════════════════════════════════
   GALLERY
══════════════════════════════════════════ */
#gallery-wrap {
  max-width: 1200px; margin: 0 auto; padding: 0 20px 80px;
  position: relative; z-index: 2;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 14px;
}
@media (max-width: 1100px) { .gallery { grid-template-columns: repeat(4, 1fr); } }
@media (max-width: 800px)  { .gallery { grid-template-columns: repeat(3, 1fr); gap: 10px; } }
@media (max-width: 500px)  { .gallery { grid-template-columns: repeat(2, 1fr); gap: 8px; } }

/* ─── Card ─── */
.card {
  perspective: 1100px; cursor: pointer;
  opacity: 0; transform: translateY(24px);
  animation: cardIn .5s ease forwards;
  /* tall portrait ratio — เน้นสูง */
  aspect-ratio: 2 / 3;
}
@keyframes cardIn { to { opacity:1; transform:none; } }

.card-inner {
  position: relative; width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform .55s cubic-bezier(.23,1,.32,1);
  border-radius: var(--r-card);
}
.card-inner.flipped { transform: rotateY(180deg); }

.card-front, .card-back {
  backface-visibility: hidden; border-radius: var(--r-card); overflow: hidden;
  position: absolute; inset: 0;
}

/* Front */
.card-front { position: absolute; background: #000; }

/* Signature corner marks — geometric identity */
.card-front::before {
  content: '';
  position: absolute; inset: 0; z-index: 3; pointer-events: none;
  background:
    linear-gradient(135deg, rgba(155,93,229,.6) 0%, transparent 15%) top left / 20px 20px no-repeat,
    linear-gradient(225deg, rgba(155,93,229,.6) 0%, transparent 15%) top right / 20px 20px no-repeat,
    linear-gradient(315deg, rgba(255,95,160,.5) 0%, transparent 15%) bottom right / 20px 20px no-repeat,
    linear-gradient(45deg, rgba(255,95,160,.5) 0%, transparent 15%) bottom left / 20px 20px no-repeat;
  border-radius: var(--r-card);
  opacity: 0; transition: opacity .3s;
}
.card:hover .card-front::before { opacity: 1; }

.card-front img {
  width: 100%; height: 100%; display: block;
  object-fit: cover; object-position: center top;
  border-radius: var(--r-card);
  transition: transform .4s ease;
  mix-blend-mode: screen;
}
.card:hover .card-front img { transform: scale(1.05); }

/* Gradient overlay — stronger at bottom for tall card */
.card-front::after {
  content: '';
  position: absolute; inset: 0; border-radius: var(--r-card);
  background: linear-gradient(180deg, transparent 40%, rgba(7,4,15,.7) 75%, rgba(7,4,15,.95) 100%);
  opacity: 0; transition: opacity .3s;
}
.card:hover .card-front::after { opacity: 1; }

/* Name tag */
.card-name {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 4;
  padding: 24px 12px 14px;
  background: linear-gradient(0deg, rgba(7,4,15,.95) 0%, transparent 100%);
  font: 700 .76rem/1.2 var(--font-ui); letter-spacing: .06em;
  color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,.9);
  opacity: 0; transform: translateY(4px); transition: all .3s;
}
.card:hover .card-name { opacity: 1; transform: none; }

/* ATK badge — always visible */
.card-atk {
  position: absolute; top: 8px; right: 8px; z-index: 5;
  font: 900 .65rem/1 var(--font-ui); letter-spacing: .05em;
  padding: 3px 8px; border-radius: 8px;
  background: rgba(7,4,15,.8); border: 1px solid rgba(255,95,160,.4);
  color: var(--c-pink); backdrop-filter: blur(6px);
  opacity: 0; transition: opacity .3s;
}
.card:hover .card-atk { opacity: 1; }

/* Hex glyph on back */
.card-back-glyph {
  width: 44px; height: 44px; margin-bottom: 4px;
  background: rgba(155,93,229,.12);
  border: 1px solid rgba(155,93,229,.3);
  border-radius: 10px; transform: rotate(45deg);
  display: flex; align-items: center; justify-content: center;
}
.card-back-glyph span { transform: rotate(-45deg); font-size: 1.3rem; }
.card-back-char { font: 700 .85rem/1.2 var(--font-ui); color: #ffd700; letter-spacing:.08em; margin-top:4px; text-shadow: 0 1px 4px rgba(0,0,0,.9); }
.card-back-hint { font: 400 .65rem/1 var(--font-body); color: rgba(255,255,255,.75); margin-top: 4px; text-shadow: 0 1px 3px rgba(0,0,0,.9); }

/* Stat mini row on back */
.card-back-stats {
  display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; justify-content: center;
}
.cbs { font: 600 .62rem/1 var(--font-ui); padding: 2px 7px; border-radius: 6px;
  background: rgba(0,0,0,.55); border: 1px solid rgba(255,215,0,.3);
  color: rgba(255,255,255,.85); text-shadow: 0 1px 2px rgba(0,0,0,.8); }
.cbs span { color: var(--c-purple); }

.card.hidden { display: none; }

/* ─── No results ─── */
#no-results {
  display: none; text-align: center; padding: 60px 20px;
  font: 400 .85rem/1 var(--font-ui); letter-spacing: .15em;
  color: rgba(255,255,255,.25);
}

/* ══════════════════════════════════════════
   CHARACTER MODAL
══════════════════════════════════════════ */
#char-modal {
  position: fixed; inset: 0; z-index: 99999;
  display: none; align-items: center; justify-content: center;
  perspective: 1400px;
}
#char-modal.open { display: flex; }

#modal-backdrop {
  position: absolute; inset: 0;
  background: rgba(4,2,12,.9); backdrop-filter: blur(16px);
  opacity: 0; transition: opacity .4s;
}
#char-modal.open #modal-backdrop { opacity: 1; }

#modal-box {
  position: relative;
  width: min(960px, 96vw); max-height: 92vh;
  display: flex; border-radius: 22px; overflow: hidden;
  border: 1px solid rgba(255,95,160,.2);
  box-shadow: 0 0 0 1px rgba(255,255,255,.04), 0 40px 100px rgba(0,0,0,.85),
              0 0 80px rgba(155,93,229,.12);
  opacity: 0; transform: scale(.9) rotateX(5deg);
  transition: opacity .5s cubic-bezier(.23,1,.32,1), transform .5s cubic-bezier(.23,1,.32,1);
}
#char-modal.open #modal-box { opacity: 1; transform: scale(1) rotateX(0); }

/* ── Image pane ── */
#modal-img-pane {
  flex: 0 0 42%; position: relative; overflow: hidden;
  background: #000;
  min-height: 500px;
}

/* Scanline overlay — signature aesthetic detail */
#modal-img-pane::after {
  content: '';
  position: absolute; inset: 0; z-index: 4; pointer-events: none;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(255,255,255,.012) 3px, rgba(255,255,255,.012) 4px
  );
}

/* Corner rune marks on image pane */
#modal-img-pane::before {
  content: '';
  position: absolute; inset: 0; z-index: 5; pointer-events: none;
  background:
    linear-gradient(135deg, rgba(155,93,229,.8) 0%, transparent 8%) top left / 24px 24px no-repeat,
    linear-gradient(315deg, rgba(255,95,160,.6) 0%, transparent 8%) bottom right / 24px 24px no-repeat;
}

#modal-img {
  width: 100%; height: 100%; object-fit: contain; object-position: center center;
  position: relative; z-index: 2;
  filter: saturate(1.1) contrast(1.05);
  transition: transform .6s ease; transform: scale(1.03);
  mix-blend-mode: screen;
}
#char-modal.open #modal-img { transform: scale(1); }

/* Ambient glow under image */
.modal-img-glow {
  position: absolute; inset: 0; z-index: 1; pointer-events: none;
  background:
    radial-gradient(ellipse at 50% 105%, rgba(255,95,160,.3) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 10%, rgba(155,93,229,.2) 0%, transparent 50%);
}

/* Floating stat chips */
.stat-chip {
  position: absolute; z-index: 6;
  background: rgba(7,4,15,.88); backdrop-filter: blur(8px);
  border-radius: 9px; padding: 5px 10px;
  font: 700 .65rem/1 var(--font-ui); letter-spacing: .04em;
  animation: floatUp 3s ease infinite;
  border: 1px solid;
}
.stat-chip-label { font-size: .55rem; color: rgba(255,255,255,.38); display: block; margin-bottom: 2px; letter-spacing: .08em; }
.stat-chip-val   { font-size: .9rem; font-weight: 900; }

.stat-chip:nth-child(1) { top: 16px; left: 12px; border-color: rgba(255,130,50,.4); animation-delay: 0s; }
.stat-chip:nth-child(1) .stat-chip-val { color: #ff9950; }
.stat-chip:nth-child(2) { top: 16px; right: 12px; border-color: rgba(80,216,144,.4); animation-delay: .7s; }
.stat-chip:nth-child(2) .stat-chip-val { color: var(--c-green); }
.stat-chip:nth-child(3) { bottom: 20px; left: 12px; border-color: rgba(90,180,255,.4); animation-delay: 1.4s; }
.stat-chip:nth-child(3) .stat-chip-val { color: var(--c-blue); }
.stat-chip:nth-child(4) { bottom: 20px; right: 12px; border-color: rgba(155,93,229,.4); animation-delay: 2.1s; }
.stat-chip:nth-child(4) .stat-chip-val { color: var(--c-purple); }

@keyframes floatUp { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

/* ── Info pane ── */
#modal-info {
  flex: 1; overflow-y: auto;
  background: linear-gradient(160deg, rgba(16,9,32,.98), rgba(8,4,18,1));
  padding: 36px 32px 30px;
  scrollbar-width: thin; scrollbar-color: rgba(255,95,160,.25) transparent;
  position: relative;
}

/* top-right corner accent */
#modal-info::before {
  content: '';
  position: absolute; top: 0; right: 0;
  width: 90px; height: 90px;
  border-top: 1px solid rgba(255,95,160,.2);
  border-right: 1px solid rgba(255,95,160,.2);
  border-radius: 0 22px 0 0; pointer-events: none;
}

#modal-close {
  position: absolute; top: 16px; right: 16px;
  width: 36px; height: 36px; border-radius: 50%; z-index: 10;
  background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
  color: rgba(255,255,255,.55); font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
#modal-close:hover { background: rgba(255,95,160,.2); border-color: rgba(255,95,160,.4); color: #fff; }

/* Character class label */
.char-eyebrow {
  font: 700 .6rem/1 var(--font-ui); letter-spacing: .22em;
  color: var(--c-purple); text-transform: uppercase; margin-bottom: 8px;
  display: flex; align-items: center; gap: 10px;
  opacity: 0; transform: translateX(-16px);
  transition: all .5s .15s;
}
.char-eyebrow::before { content:''; width:24px; height:1px; background:var(--c-purple); }
#char-modal.open .char-eyebrow { opacity:1; transform:none; }

/* Name */
#modal-name {
  font: 900 2.2rem/1.1 var(--font-display);
  background: linear-gradient(135deg, #fff 0%, var(--c-pink) 55%, var(--c-purple) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
  opacity: 0; transform: translateX(-18px);
  transition: all .5s .2s;
}
#char-modal.open #modal-name { opacity:1; transform:none; }

/* Bio tags */
.bio-tags {
  display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0 20px;
  opacity: 0; transform: translateY(8px);
  transition: all .5s .28s;
}
#char-modal.open .bio-tags { opacity:1; transform:none; }
.bio-tag {
  padding: 3px 12px; border-radius: 20px;
  font: 600 .7rem/1 var(--font-body); border: 1px solid;
}
.bt-date  { color: var(--c-blue);  border-color: rgba(90,180,255,.3);  background: rgba(90,180,255,.08); }
.bt-age   { color: var(--c-green); border-color: rgba(80,216,144,.3); background: rgba(80,216,144,.08); }
.bt-type  { color: var(--c-pink);  border-color: rgba(255,95,160,.3);  background: rgba(255,95,160,.08); }

/* Divider */
.modal-divider {
  height: 1px; margin: 18px 0;
  background: linear-gradient(90deg, transparent, rgba(255,95,160,.3), rgba(155,93,229,.3), transparent);
  opacity: 0; transition: opacity .5s .35s;
}
#char-modal.open .modal-divider { opacity:1; }

/* Info grid */
.info-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;
  opacity: 0; transform: translateY(10px); transition: all .5s .32s;
}
#char-modal.open .info-grid { opacity:1; transform:none; }
.info-cell {
  background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07);
  border-radius: 10px; padding: 11px 14px; transition: border-color .2s;
}
.info-cell:hover { border-color: rgba(255,95,160,.25); }
.info-label { font: 700 .6rem/1 var(--font-ui); letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,.3); margin-bottom:4px; }
.info-value { font: 600 .88rem/1.3 var(--font-body); color: rgba(255,255,255,.85); }

/* Section header */
.section-head {
  font: 700 .68rem/1 var(--font-ui); letter-spacing: .18em; text-transform: uppercase;
  color: var(--c-gold); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
  opacity: 0; transition: opacity .5s .42s;
}
.section-head::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,rgba(240,192,96,.25),transparent); }
#char-modal.open .section-head { opacity:1; }

/* Lore */
.lore-box {
  font: 400 .83rem/1.8 var(--font-body); color: rgba(255,255,255,.55);
  background: rgba(255,255,255,.025); border: 1px solid rgba(255,255,255,.06);
  border-radius: 12px; padding: 16px 18px; position: relative;
  opacity: 0; transform: translateY(12px); transition: all .5s .46s;
}
#char-modal.open .lore-box { opacity:1; transform:none; }
.lore-box::before {
  content: '"'; font: 900 3rem/1 var(--font-display);
  position: absolute; top: -8px; left: 14px; color: rgba(255,95,160,.2);
}

/* Stat bars */
.stat-section {
  margin-top: 18px;
  opacity: 0; transform: translateY(12px); transition: all .5s .52s;
}
#char-modal.open .stat-section { opacity:1; transform:none; }
.stat-row { margin-bottom: 9px; }
.stat-header {
  display: flex; justify-content: space-between; margin-bottom: 4px;
  font: 600 .7rem/1 var(--font-ui); color: rgba(255,255,255,.45);
}
.stat-track { height: 7px; border-radius: 4px; background: rgba(255,255,255,.07); overflow:hidden; }
.stat-fill {
  height:100%; border-radius:4px; width:0%;
  transition: width 1s .85s cubic-bezier(.23,1,.32,1);
}
.stat-fill[data-stat="ATK"]   { background: linear-gradient(90deg,var(--c-pink),#f97316);   box-shadow:0 0 8px rgba(249,115,22,.4); }
.stat-fill[data-stat="HP"]    { background: linear-gradient(90deg,var(--c-green),#16a34a);  box-shadow:0 0 8px rgba(80,216,144,.4); }
.stat-fill[data-stat="RUN"]   { background: linear-gradient(90deg,var(--c-blue),#3b82f6);   box-shadow:0 0 8px rgba(90,180,255,.4); }
.stat-fill[data-stat="SPELL"] { background: linear-gradient(90deg,var(--c-purple),#6d28d9); box-shadow:0 0 8px rgba(155,93,229,.4); }
#char-modal.open .stat-fill   { width: var(--w); }

/* Skill section */
.skill-section {
  margin-top: 18px;
  opacity: 0; transform: translateY(12px); transition: all .5s .58s;
}
#char-modal.open .skill-section { opacity:1; transform:none; }
.skill-box {
  background: rgba(155,93,229,.05); border: 1px solid rgba(155,93,229,.2);
  border-radius: 12px; padding: 3px 6px; margin-top: 2px; max-width: 85%;
  margin-left: auto; margin-right: auto;
}
.skill-chips { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:3px; }
.skill-chip {
  padding: 1px 5px; border-radius: 20px; font: 700 .52rem/1 var(--font-ui);
  background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.11);
  color: rgba(255,255,255,.7);
}
.skill-chip span { color: var(--c-pink); }
.skill-desc { font: 400 .60rem/1.3 var(--font-body); color: rgba(255,255,255,.55); white-space: pre-wrap; }
.skill-quote {
  margin-top: 2px; font: 400 italic .55rem/1.2 var(--font-body);
  color: rgba(240,192,96,.6); border-left: 2px solid rgba(240,192,96,.3); padding-left: 6px;
}

/* Modal nav */
.modal-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 42px; height: 42px; border-radius: 50%; z-index: 10;
  background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
  color: rgba(255,255,255,.65); font-size: 17px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px); transition: all .2s;
}
.modal-nav:hover { background: rgba(255,95,160,.18); border-color: rgba(255,95,160,.4); color:#fff; }
#modal-prev { left: -56px; }
#modal-next { right: -56px; }

/* Mobile nav row */
.modal-nav-row {
  display: none; gap: 12px; justify-content: space-between;
  margin-top: 24px; padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,.07);
}
.modal-nav-row .modal-nav {
  position: static; transform: none;
  width: 44px; height: 44px; flex: 0 0 44px;
}

/* ══════════════════════════════════════════
   MUSIC BUTTON
══════════════════════════════════════════ */
#music-btn {
  position: fixed; bottom: 24px; right: 24px; z-index: 999;
  width: 54px; height: 54px; border-radius: 50%;
  background: rgba(13,8,28,.9); border: 1px solid rgba(255,95,160,.25);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px;
  backdrop-filter: blur(12px); transition: all .3s;
  box-shadow: 0 4px 20px rgba(0,0,0,.5);
}
#music-btn:hover { background: rgba(255,95,160,.12); border-color: rgba(255,95,160,.5); }
.music-wave {
  position: absolute; inset: -6px; border-radius: 50%;
  border: 1.5px solid rgba(255,95,160,.35); opacity: 0;
}
.music-wave:nth-child(2) { inset: -14px; }
.music-wave:nth-child(3) { inset: -24px; }
#music-btn.playing .music-wave { animation: mwave 1.8s ease-out infinite; }
#music-btn.playing .music-wave:nth-child(2) { animation-delay: .45s; }
#music-btn.playing .music-wave:nth-child(3) { animation-delay: .9s; }
@keyframes mwave { 0%{opacity:.65;transform:scale(.92)} 100%{opacity:0;transform:scale(1.35)} }
.music-icon { position:relative; z-index:1; transition:transform .2s; }
#music-btn:hover .music-icon { transform: scale(1.12); }

/* ══════════════════════════════════════════
   LOADING SCREEN
══════════════════════════════════════════ */
#loading {
  position: fixed; inset: 0; z-index: 999999;
  background: #06030f;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
  transition: opacity .7s, visibility .7s;
}
#loading.done { opacity: 0; visibility: hidden; pointer-events: none; }

.load-ring-wrap { position:relative; width:100px; height:100px; display:flex; align-items:center; justify-content:center; }
.load-ring {
  position: absolute; inset:0; border-radius:50%;
  border: 1.5px solid transparent;
  border-top-color: var(--c-pink); border-right-color: var(--c-purple);
  animation: spin 1.4s linear infinite;
}
.load-ring:nth-child(2) { inset:10px; border-top-color:var(--c-purple); border-right-color:transparent; border-bottom-color:var(--c-blue); animation-duration:2s; animation-direction:reverse; }
@keyframes spin { to{transform:rotate(360deg)} }

.load-glyph {
  font: 900 2rem/1 var(--font-display);
  background: var(--g-brand); -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  animation: glyphPulse 1.8s ease infinite;
}
@keyframes glyphPulse { 0%,100%{opacity:.6;transform:scale(.95)} 50%{opacity:1;transform:scale(1)} }

.load-bar { width:180px; height:2px; background:rgba(255,255,255,.08); border-radius:4px; overflow:hidden; }
.load-fill { height:100%; background:linear-gradient(90deg,var(--c-pink),var(--c-purple),var(--c-blue)); animation:fillBar 2.2s cubic-bezier(.4,0,.2,1) forwards; }
@keyframes fillBar { to{width:100%} }

.load-label { font:.65rem/1 var(--font-ui); letter-spacing:.28em; color:rgba(255,255,255,.3); text-transform:uppercase; animation:blink 1.1s ease infinite; }
@keyframes blink { 0%,100%{opacity:.25} 50%{opacity:.8} }

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media (max-width: 768px) {
  #manual .manual-header { padding: 12px 16px; gap: 10px; }
  .manual-title { font-size: .85rem; }
  .manual-badge { display: none; }
  .manual-content { padding: 0 14px 16px; }
  .rule-grid { max-width: 100%; }
  .rule-title { font-size: .72rem; }
  .rule-desc  { font-size: .65rem; }

  /* Filter bar — scrollable row */
  #filter-bar { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 0 14px; gap: 7px; scrollbar-width: none; }
  #filter-bar::-webkit-scrollbar { display: none; }
  .search-wrap { min-width: 140px; flex: 0 0 140px; }
  .filter-btn { flex-shrink: 0; padding: 8px 14px; font-size: .68rem; }

  /* Gallery */
  #gallery-wrap { padding: 0 12px 100px; }

  /* Modal — full screen, card shows fully then scroll to info */
  #char-modal { align-items: flex-start; padding: 0; }
  #modal-box {
    width: 100vw !important;
    height: 100dvh;
    max-height: 100dvh;
    border-radius: 0;
    flex-direction: column;
    border: none;
    overflow-y: scroll;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  #modal-img-pane {
    flex: 0 0 auto;
    width: 100%;
    /* ความสูงพอดีกับหน้าจอ 90% ให้เห็นการ์ดเต็ม แต่ยังเห็นว่ามีข้อมูลข้างล่าง */
    height: 90dvh;
    min-height: 90dvh;
    max-height: 90dvh;
  }
  #modal-info {
    flex: 0 0 auto;
    padding: 24px 18px 80px;
    overflow-y: visible;
    min-height: 80dvh;
    border-radius: 22px 22px 0 0;
    margin-top: -22px;
    position: relative;
    z-index: 10;
    background: linear-gradient(160deg, rgba(16,9,32,.99), rgba(8,4,18,1));
  }
  #modal-name { font-size: 1.55rem; }
  .info-grid { gap: 7px; }
  /* Nav arrows → row at bottom of info pane */
  .modal-nav { position: static; transform: none; width: 38px; height: 38px; font-size: 14px; }
  .modal-nav-row { display: flex !important; justify-content: space-between; margin-top: 20px; }
  #modal-prev, #modal-next { position: static !important; transform: none !important; }

  /* Stat chips — hide on mobile (cramped) */
  .stat-chip { display: none; }

  /* Music button */
  #music-btn { bottom: 16px; right: 16px; width: 46px; height: 46px; }

  /* Toast */
  #toast-wrap { bottom: 72px; }
}

@media (max-width: 480px) {
  .gallery { grid-template-columns: repeat(2, 1fr) !important; gap: 8px; }
  #modal-name { font-size: 1.3rem; }
  #modal-img-pane { height: 90dvh; min-height: 90dvh; max-height: 90dvh; }
  .manual-title { font-size: .78rem; }
  .manual-logo { height: 26px; }
  .info-grid { grid-template-columns: 1fr 1fr; }
}

/* ─── Touch adjustments ─── */
@media (hover: none) {
  .card-front::before,
  .card-front::after,
  .card-name,
  .card-atk { opacity:1 !important; transform:none !important; }
  .card:hover .card-front img { transform:none; }
}

/* ══════════════════════════════════════════
   ART DECO DIVIDERS (ภาพ 1)
══════════════════════════════════════════ */
.artdeco-divider {
  width: 100%; display: flex; align-items: center; justify-content: center;
  margin: 10px 0 14px; overflow: visible;
}
.artdeco-divider svg { width: min(520px, 90%); height: auto; }

/* ══════════════════════════════════════════
   CARD MOON FRAME (ภาพ 2) — wraps card-inner
══════════════════════════════════════════ */
.card-moon-frame {
  position: absolute; inset: 0; z-index: 10; pointer-events: none;
  border-radius: var(--r-card); overflow: hidden;
}
.card-moon-frame svg {
  position: absolute; inset: 0; width: 100%; height: 100%;
}

/* ══════════════════════════════════════════
   RUNIC SECTION (ภาพ 3) — inside modal DATA
══════════════════════════════════════════ */
.runic-header {
  display: flex; flex-direction: column; align-items: center;
  margin-bottom: 18px; gap: 4px;
}
.runic-label {
  font: 700 .55rem/1 var(--font-ui); letter-spacing: .3em;
  text-transform: uppercase; color: var(--c-gold); opacity: .65;
}
.runic-glyphs {
  display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
  margin: 4px 0;
}
.runic-glyph {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.runic-glyph svg {
  width: 22px; height: 28px; overflow: visible;
}
.runic-glyph .rg-latin {
  font: 600 .45rem/1 var(--font-ui); letter-spacing: .06em;
  color: rgba(240,192,96,.45);
}
/* Runic banner above character name in modal */
.modal-rune-banner {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
  opacity: 0; transform: translateY(-8px); transition: all .5s .1s;
}
#char-modal.open .modal-rune-banner { opacity: 1; transform: none; }
.modal-rune-banner svg { height: 18px; width: auto; opacity: .55; }
.modal-rune-sep-line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(240,192,96,.3), transparent);
}









/* ── Tutorial banners: individual PNG images ── */
.banner-stack {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-width: 600px;
  margin: 0 auto 10px;
}
.banner-img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 4px;
  filter: drop-shadow(0 6px 20px rgba(0,0,0,0.9))
          drop-shadow(0 0 10px rgba(180,130,50,0.35));
  transition: filter .22s, transform .22s;
}
.banner-img:hover {
  filter: drop-shadow(0 8px 26px rgba(0,0,0,0.95))
          drop-shadow(0 0 22px rgba(210,160,55,0.6));
  transform: scale(1.015);
}

/* ══════════════════════════════════════════
   IMAGE LIGHTBOX — fullscreen card zoom
══════════════════════════════════════════ */
#img-lightbox {
  position: fixed; inset: 0; z-index: 999999;
  display: none; align-items: center; justify-content: center;
  background: rgba(2,1,8,0.96);
  backdrop-filter: blur(20px);
  animation: lbFadeIn .25s ease both;
}
#img-lightbox.open { display: flex; }
@keyframes lbFadeIn { from { opacity:0; } to { opacity:1; } }

#lb-img {
  width: min(88vw, 520px);
  max-height: 90dvh;
  object-fit: contain;
  border-radius: 14px;
  box-shadow:
    0 0 0 1px rgba(255,95,160,.25),
    0 0 60px rgba(155,93,229,.3),
    0 30px 80px rgba(0,0,0,.9);
  animation: lbZoomIn .3s cubic-bezier(.23,1,.32,1) both;
  cursor: zoom-out;
  touch-action: pinch-zoom;
  user-select: none;
}
@media (max-width: 600px) {
  #lb-img {
    width: 92vw;
    max-height: 88dvh;
    border-radius: 10px;
  }
  #img-lightbox {
    padding: 0;
  }
}
@keyframes lbZoomIn {
  from { transform: scale(0.82); opacity:0; }
  to   { transform: scale(1);    opacity:1; }
}

#lb-close {
  position: absolute; top: 18px; right: 18px;
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.15);
  color: rgba(255,255,255,.7); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; z-index: 10;
}
#lb-close:hover { background: rgba(255,95,160,.25); border-color: rgba(255,95,160,.5); color:#fff; }

/* Zoom hint overlay on modal img */
#modal-img-pane {
  cursor: zoom-in;
}
.img-zoom-hint {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  z-index: 7;
  background: rgba(7,4,15,.82); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,95,160,.3);
  border-radius: 20px; padding: 4px 14px;
  font: 600 .62rem/1 var(--font-ui); letter-spacing: .1em;
  color: rgba(255,255,255,.55);
  pointer-events: none;
  opacity: 0; transition: opacity .3s;
  white-space: nowrap;
}
#modal-img-pane:hover .img-zoom-hint,
#modal-img-pane:focus .img-zoom-hint { opacity: 1; }
@media (hover: none) { .img-zoom-hint { opacity: 1 !important; } }


/* ── Mobile scroll-down hint on image pane ── */
@media (max-width: 767px) {
  .modal-scroll-hint {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    z-index: 8; display: flex; flex-direction: column; align-items: center; gap: 2px;
    pointer-events: none; animation: bounceDown 1.8s ease infinite;
  }
  .modal-scroll-hint span {

const curDot = document.getElementById("cursor-dot")
const curRing = document.getElementById("cursor-ring")
let rx = 0, ry = 0, dx = 0, dy = 0

window.addEventListener("mousemove", e => {
  dx = e.clientX; dy = e.clientY
  curDot.style.left = dx + "px"; curDot.style.top = dy + "px"
}, { passive: true })

;(function animRing() {
  rx += (dx - rx) * .15; ry += (dy - ry) * .15
  curRing.style.left = rx + "px"; curRing.style.top = ry + "px"
  requestAnimationFrame(animRing)
})()

document.querySelectorAll("button, a, .card, .rule-box, .filter-btn").forEach(el => {

  el.addEventListener("mouseleave", () => document.body.classList.remove("cur-hover"))
})
document.addEventListener("mousedown", () => document.body.classList.add("cur-click"))
document.addEventListener("mouseup",   () => document.body.classList.remove("cur-click"))

// ── Stars ──
const canvas = document.getElementById("particles")
const ctx = canvas.getContext("2d")
let mouse = { x: innerWidth / 2, y: innerHeight / 2 }

function resizeCanvas() { canvas.width = innerWidth; canvas.height = innerHeight }
resizeCanvas(); window.addEventListener("resize", resizeCanvas)
document.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY })

const stars = Array.from({ length: CONFIG.starCount }, () => ({
  x: Math.random() * innerWidth, y: Math.random() * innerHeight,
  r: Math.random() * 2, depth: Math.random() * 2.5, tw: Math.random() * Math.PI * 2
}))

;(function tick() {
  ctx.clearRect(0, 0, canvas.width, canvas.height)
  const t = Date.now() / 1000
  stars.forEach(s => {
    const dx = (mouse.x - canvas.width / 2) * .0005 * s.depth
    const dy = (mouse.y - canvas.height / 2) * .0005 * s.depth
    const a = .45 + .55 * Math.sin(t + s.tw)
    ctx.beginPath()
    ctx.arc(s.x + dx * 100, s.y + dy * 100, s.r, 0, Math.PI * 2)
    ctx.fillStyle = `rgba(255,255,255,${a})`
    ctx.fill()
  })
  requestAnimationFrame(tick)
})()

// ── Floating effect (glyph images) ──
function spawnGlyph() {
  const el = document.createElement("img")
  const size = 60 + Math.random() * 100
  el.src = CONFIG.effectImg
  Object.assign(el.style, {
    position: "fixed",
    left: Math.random() * (innerWidth - size) + "px",
    top: Math.random() * (innerHeight - size) + "px",
    width: size + "px", height: size + "px",
    objectFit: "contain", pointerEvents: "none", zIndex: 3, opacity: 0,
    filter: "invert(1) sepia(1) saturate(6) hue-rotate(270deg) brightness(1.2)"
  })
  document.body.appendChild(el)
  const dur = 2800 + Math.random() * 2200
  const rot = (Math.random() - .5) * 50
  el.animate([
    { opacity: 0, transform: `rotate(${rot - 8}deg) scale(.75)` },
    { opacity: .65, transform: `rotate(${rot}deg) scale(1)`, offset: .35 },
    { opacity: .45, transform: `rotate(${rot + 4}deg) scale(1.05)`, offset: .7 },
    { opacity: 0, transform: `rotate(${rot + 8}deg) scale(.88)` }
  ], { duration: dur, easing: "ease-in-out", fill: "forwards" })
  setTimeout(() => el.remove(), dur)
}
setInterval(spawnGlyph, CONFIG.sakuraInterval)

      color:#fff; width:48px; height:48px; border-radius:50%;
      font-size:1.5rem; cursor:pointer;
    }
    #mpop-prev:disabled, #mpop-next:disabled { opacity:.25; cursor:default; }
    #mpop-counter {
      font:600 .85rem/1 'Cinzel',serif; letter-spacing:.08em;
      color:rgba(255,255,255,.5); min-width:54px; text-align:center;
    }
    #mpop-hint {
      position:absolute; top:14px; left:50%; transform:translateX(-50%);
      font:400 .68rem/1 'Cinzel',serif; letter-spacing:.07em;
      color:rgba(255,255,255,.28); white-space:nowrap; pointer-events:none;
    }
  `
  document.head.appendChild(pStyle)

  const mpopImg  = document.getElementById("mpop-img")
  const mpopVp   = document.getElementById("mpop-viewport")
  const mpopCtr  = document.getElementById("mpop-counter")
  const mpopPrev = document.getElementById("mpop-prev")
  const mpopNext = document.getElementById("mpop-next")
  const mpopClose= document.getElementById("mpop-close")

  // ── transform state (offset from natural centered position) ──
  let tz = { scale:1, dx:0, dy:0 }

  function applyT(smooth) {
    mpopImg.style.transition = smooth ? "transform .22s ease" : "none"
    mpopImg.style.transform  = `translate(${tz.dx}px,${tz.dy}px) scale(${tz.scale})`
  }

  function resetT(smooth) {
    tz = { scale:1, dx:0, dy:0 }
    applyT(smooth)
    mpopVp.style.cursor = "grab"
  }

  function clamp() {
    const vw = mpopVp.clientWidth,  vh = mpopVp.clientHeight
    const iw = mpopImg.clientWidth  * tz.scale
    const ih = mpopImg.clientHeight * tz.scale
    const mx = Math.max(0, (iw - vw) / 2)
    const my = Math.max(0, (ih - vh) / 2)
    tz.dx = Math.max(-mx, Math.min(mx, tz.dx))
    tz.dy = Math.max(-my, Math.min(my, tz.dy))
  }

  function openPopup(idx) {
    current = idx
    resetT(false)
    mpopImg.src = pages[current]
    mpopCtr.textContent = `${current+1} / ${pages.length}`
    mpopPrev.disabled = current === 0
    mpopNext.disabled = current === pages.length-1
    popup.style.display = "flex"
    document.body.style.overflow = "hidden"
  }
  function closePopup() {
    popup.style.display = "none"
    document.body.style.overflow = ""
    current = -1
  }

  mpopClose.addEventListener("click", closePopup)
  popup.addEventListener("click", e => { if(e.target===popup) closePopup() })
  mpopPrev.addEventListener("click", () => { if(current>0) openPopup(current-1) })
  mpopNext.addEventListener("click", () => { if(current<pages.length-1) openPopup(current+1) })

  document.addEventListener("keydown", e => {
    if (popup.style.display !== "flex") return
    if (e.key === "Escape") closePopup()
    if (e.key === "ArrowRight" && tz.scale<=1.05 && current<pages.length-1) openPopup(current+1)
    if (e.key === "ArrowLeft"  && tz.scale<=1.05 && current>0) openPopup(current-1)
  })

  // ── Ctrl + Scroll → zoom (desktop) ──
  mpopVp.addEventListener("wheel", e => {
    if (!e.ctrlKey) return          // normal scroll → do nothing
    e.preventDefault()
    const rect    = mpopVp.getBoundingClientRect()
    const ox      = e.clientX - rect.left - rect.width/2   // offset from center
    const oy      = e.clientY - rect.top  - rect.height/2
    const factor  = e.deltaY < 0 ? 1.15 : 1/1.15
    const newScale= Math.min(6, Math.max(1, tz.scale * factor))
    const ratio   = newScale / tz.scale
    tz.dx   = ox + ratio*(tz.dx - ox)
    tz.dy   = oy + ratio*(tz.dy - oy)
    tz.scale= newScale
    clamp(); applyT(false)
    mpopVp.style.cursor = tz.scale>1.05 ? "grab" : "grab"
  }, { passive:false })

  // ── Mouse drag → pan (desktop) ──
  let md = { on:false, sx:0, sy:0, sdx:0, sdy:0 }
  mpopVp.addEventListener("mousedown", e => {
    if (e.button!==0) return
    md = { on:true, sx:e.clientX, sy:e.clientY, sdx:tz.dx, sdy:tz.dy }
    mpopVp.classList.add("grabbing")
  })
  window.addEventListener("mousemove", e => {
    if (!md.on) return
    tz.dx = md.sdx + (e.clientX - md.sx)
    tz.dy = md.sdy + (e.clientY - md.sy)
    clamp(); applyT(false)
  })
  window.addEventListener("mouseup", () => {
    md.on = false; mpopVp.classList.remove("grabbing")
  })

  // ── Double-click → reset ──
  mpopVp.addEventListener("dblclick", () => resetT(true))

  // ── Touch: pinch zoom + drag ──
  let tc = {}, tg = { pinch:false, s0:1, d0:0, mx0:0, my0:0, dx0:0, dy0:0, tx0:0, ty0:0 }
  let lastTap = 0

  mpopVp.addEventListener("touchstart", e => {
    e.preventDefault()
    Array.from(e.changedTouches).forEach(t => { tc[t.identifier]={x:t.clientX,y:t.clientY} })
    const pts = Object.values(tc)
    if (pts.length===2) {
      tg.pinch = true
      tg.d0    = Math.hypot(pts[1].x-pts[0].x, pts[1].y-pts[0].y)
      tg.s0    = tz.scale
      tg.mx0   = (pts[0].x+pts[1].x)/2
      tg.my0   = (pts[0].y+pts[1].y)/2
      tg.dx0   = tz.dx; tg.dy0 = tz.dy
    } else if (pts.length===1) {
      tg.pinch = false
      tg.tx0   = pts[0].x; tg.ty0 = pts[0].y
      tg.dx0   = tz.dx;    tg.dy0 = tz.dy
      const now = Date.now()
      if (now - lastTap < 280) resetT(true)
      lastTap = now
    }
  }, { passive:false })

  mpopVp.addEventListener("touchmove", e => {
    e.preventDefault()
    Array.from(e.changedTouches).forEach(t => { tc[t.identifier]={x:t.clientX,y:t.clientY} })
    const pts = Object.values(tc)
    const rect = mpopVp.getBoundingClientRect()
    if (tg.pinch && pts.length===2) {
      const d   = Math.hypot(pts[1].x-pts[0].x, pts[1].y-pts[0].y)
      const mx  = (pts[0].x+pts[1].x)/2
      const my  = (pts[0].y+pts[1].y)/2
      const ns  = Math.min(6, Math.max(1, tg.s0 * d/tg.d0))
      const r   = ns/tg.s0
      const cx  = tg.mx0 - rect.left - rect.width/2
      const cy  = tg.my0 - rect.top  - rect.height/2
      tz.dx     = cx + r*(tg.dx0 - cx) + (mx - tg.mx0)
      tz.dy     = cy + r*(tg.dy0 - cy) + (my - tg.my0)
      tz.scale  = ns
      clamp(); applyT(false)
    } else if (!tg.pinch && pts.length===1 && tz.scale>1.05) {
      tz.dx = tg.dx0 + (pts[0].x - tg.tx0)
      tz.dy = tg.dy0 + (pts[0].y - tg.ty0)
      clamp(); applyT(false)
    }
  }, { passive:false })

  mpopVp.addEventListener("touchend", e => {
    Array.from(e.changedTouches).forEach(t => { delete tc[t.identifier] })
    const pts = Object.values(tc)
    if (pts.length===0) {
      if (!tg.pinch && tz.scale<=1.05) {
        const dx = e.changedTouches[0].clientX - tg.tx0
        if (Math.abs(dx)>50) {
          if (dx<0 && current<pages.length-1) openPopup(current+1)
          if (dx>0 && current>0) openPopup(current-1)
        }
      }
      if (pts.length<2) tg.pinch=false
    }
  }, { passive:false })

  showCover()

  // กด icon button → เปิด popup หน้า 1
  const iconBtn = document.getElementById("manual-icon-btn")
  if (iconBtn) iconBtn.addEventListener("click", () => openPopup(0))

  manualHdr.addEventListener("click", () => {
    manualEl.classList.toggle("collapsed")
  })
})();

// ── Card Interactions ──
const isTouch = "ontouchstart" in window || navigator.maxTouchPoints > 0
document.querySelectorAll(".card").forEach(card => {
  const inner = card.querySelector(".card-inner")
  if (!isTouch) {
    card.addEventListener("mouseenter", () => inner.classList.add("flipped"))
    card.addEventListener("mouseleave", () => { inner.classList.remove("flipped"); card.style.transform = "" })
    card.addEventListener("mousemove", e => {
      const r = card.getBoundingClientRect()
      card.style.transform = `rotateX(${-(e.clientY - r.top - r.height/2)/18}deg) rotateY(${(e.clientX - r.left - r.width/2)/18}deg) scale(1.03)`
    })
    card.addEventListener("click", () => openModal(parseInt(card.dataset.idx)))
  } else {
    // Mobile: ใช้ touch events แทน click เพื่อป้องกัน scroll ทำให้ modal เปิดโดยไม่ตั้งใจ
    let touchStartX = 0, touchStartY = 0, touchMoved = false
    card.addEventListener("touchstart", e => {
      touchStartX = e.touches[0].clientX
      touchStartY = e.touches[0].clientY
      touchMoved = false
      inner.classList.add("flipped")
    }, { passive: true })
    card.addEventListener("touchmove", e => {
      const dx = Math.abs(e.touches[0].clientX - touchStartX)
      const dy = Math.abs(e.touches[0].clientY - touchStartY)
      if (dx > 8 || dy > 8) touchMoved = true
    }, { passive: true })
    card.addEventListener("touchend", e => {
      setTimeout(() => inner.classList.remove("flipped"), 380)
      if (!touchMoved) openModal(parseInt(card.dataset.idx))
    }, { passive: true })
  }
})

// ── Search & Filter ──
let activeFilter = "all"
function applyFilter() {
  const q = document.getElementById("search-input").value.toLowerCase().trim()
  let vis = 0
  document.querySelectorAll(".card").forEach(card => {
    const char = CHARACTERS[parseInt(card.dataset.idx)]
    if (!char) return
    const textOk = !q || char.name.toLowerCase().includes(q) || (char.lore || "").toLowerCase().includes(q)
    let filterOk = true
    if (activeFilter === "high-atk") filterOk = (char.stats?.find(s => s.name === "ATK")?.val ?? 0) >= 8
    if (activeFilter === "high-hp")  filterOk = (char.stats?.find(s => s.name === "HP")?.val  ?? 0) >= 7
    if (activeFilter === "spell")    filterOk = !!char.skill
    const show = textOk && filterOk
    card.classList.toggle("hidden", !show)
    if (show) vis++
  })
  document.getElementById("no-results").style.display = vis === 0 ? "block" : "none"
}
document.getElementById("search-input").addEventListener("input", applyFilter)
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"))
    btn.classList.add("active")
    activeFilter = btn.dataset.filter
    applyFilter()
    toast("✦ " + btn.textContent)
  })
})

  if (src) openLightbox(src)
})
lbImg.addEventListener("click", closeLightbox)
lbClose.addEventListener("click", closeLightbox)
imgLightbox.addEventListener("click", e => { if (e.target === imgLightbox) closeLightbox() })
document.addEventListener("keydown", e => { if (e.key === "Escape" && imgLightbox.classList.contains("open")) closeLightbox() })

// ── Pinch-to-zoom on lightbox image ──
;(function() {
  let lastDist = 0, curScale = 1, startScale = 1
  lbImg.addEventListener("touchstart", e => {
    if (e.touches.length === 2) {
      lastDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      )
      startScale = curScale
      e.preventDefault()
    }
  }, { passive: false })
  lbImg.addEventListener("touchmove", e => {
    if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      )
      curScale = Math.min(Math.max(startScale * (dist / lastDist), 0.8), 4)
      lbImg.style.transform = `scale(${curScale})`
      e.preventDefault()
    }
  }, { passive: false })
  lbImg.addEventListener("touchend", e => {
    if (e.touches.length < 2 && curScale < 1.05) {
      curScale = 1
      lbImg.style.transform = "scale(1)"
    }
  })
  // Double-tap to reset
  let lastTap = 0
  lbImg.addEventListener("touchend", e => {
    const now = Date.now()
    if (now - lastTap < 300) {
      curScale = 1; lbImg.style.transform = "scale(1)"
    }
    lastTap = now
  })
})()

// ── Music ──
const bgm = document.getElementById("bgm")
const musicBtn = document.getElementById("music-btn")
musicBtn.addEventListener("click", () => {
  if (bgm.paused) {
    bgm.play()
    musicBtn.querySelector(".music-icon").textContent = "⏸"
    musicBtn.classList.add("playing")
    toast("♪ เล่นเพลงประกอบ")
  } else {
    bgm.pause()
    musicBtn.querySelector(".music-icon").textContent = "▶"
    musicBtn.classList.remove("playing")
    toast("⏸ หยุดเพลง")
  }
})
</script>
